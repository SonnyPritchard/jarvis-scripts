interface:
  display_name: "Maintainer Orchestrator"
  short_description: "Delegate repo work and prepare mergeable queues"
  default_prompt: "Use $maintainer-orchestrator as the only thread-topology owner for Peter-majority repositories except OpenClaw and ClawHub. Create and steer repository workers directly; forbid workers from subdelegating. Rename each assigned worker as Project: short current task, monitor every five minutes, maintain ~/oss-orchestrator.md, prepare decision-ready mergeable PRs with live proof and green CI, print full URLs, and release empty queues with patch by default or minor only for substantial additive features."
